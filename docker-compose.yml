services:

  bot:
    build:
      context: .
      # На Linux: сборка в сети хоста часто убирает таймауты NAT/DNS до PyPI
      network: host
      args:
        # Зеркало отдаёт whl со своего CDN — меньше обрывов до files.pythonhosted.org (РФ/Азия)
        # Вернуть официальный индекс: https://pypi.org/simple
        PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
    env_file:
      - .env
    container_name: support-bot
    command: sh -c "cd /usr/src/app && python -m app"
    restart: always
    depends_on:
      - redis
    volumes:
      - .:/usr/src/app
    networks:
      - network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    container_name: support-redis
    restart: always
    volumes:
      - ./redis/data/:/data
    networks:
      - network


networks:
  network:
